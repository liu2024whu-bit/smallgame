<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="一款从初三走到20岁的原创网页解谜生日礼物。" />
  <meta name="theme-color" content="#efe5d5" />
  <title>写给第20圈的无地址信</title>
  <link rel="icon" href="assets/mark.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/room.css" />
  <link rel="stylesheet" href="styles/memory.css" />
  <link rel="stylesheet" href="styles/wind-breath.css" />
  <link rel="stylesheet" href="styles/film-finale.css" />
  <link rel="stylesheet" href="styles/ui.css" />
  <link rel="stylesheet" href="styles/photo-scenes.css" />
  <link rel="stylesheet" href="styles/film-hotspots.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <style>
    .boot-screen,.boot-error{box-sizing:border-box;min-height:100vh;display:grid;place-content:center;gap:14px;padding:32px;text-align:center;color:#403933;background:radial-gradient(circle at 50% 28%,#fffaf0 0,#efe5d5 64%,#e5d7c5 100%);font-family:"Noto Serif SC","Songti SC",serif}
    .boot-seal{width:68px;height:68px;margin:auto;display:grid;place-items:center;border:1px solid #9b7765;border-radius:50%;background:#f7eee0;box-shadow:0 12px 30px #6e514326;font-size:24px}
    .boot-screen p,.boot-error p{margin:0;line-height:1.8}.boot-error pre{max-width:min(720px,88vw);overflow:auto;padding:14px;border-radius:12px;background:#fff9ef;border:1px solid #cdb7a4;text-align:left;white-space:pre-wrap;font:12px/1.6 ui-monospace,Consolas,monospace}
    .boot-error button{justify-self:center;padding:10px 18px;border:0;border-radius:999px;background:#5d756d;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div id="app">
    <main class="boot-screen" aria-live="polite">
      <div class="boot-seal">20</div>
      <strong>正在打开记忆册</strong>
      <p>红线正在穿过散落的年份，请稍候……</p>
    </main>
  </div>
  <dialog id="dialog" class="dialog">
    <button class="dialog-close" type="button" aria-label="关闭" onclick="this.closest('dialog').close()">×</button>
    <div id="dialogBody"></div>
  </dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <noscript><main class="boot-error"><h1>需要启用 JavaScript</h1><p>请在浏览器设置中允许 JavaScript，然后刷新页面。</p></main></noscript>
  <script type="module">
    const root = document.querySelector('#app');
    import('./src/app.js?v=1.1.1').catch((error) => {
      console.error('smallgame boot failed', error);
      root.innerHTML = `
        <main class="boot-error">
          <div class="boot-seal">!</div>
          <h1>记忆册暂时没有打开</h1>
          <p>页面文件已经载入，但游戏模块启动失败。请先强制刷新；下方信息可用于继续修复。</p>
          <pre id="bootErrorDetail"></pre>
          <button type="button" onclick="location.reload()">重新打开</button>
        </main>`;
      document.querySelector('#bootErrorDetail').textContent = error?.stack || error?.message || String(error);
    });
  </script>
</body>
</html>
