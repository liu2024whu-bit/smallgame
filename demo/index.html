<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>第20圈闭合以前 - V1 Preview</title>
<style>
body{margin:0;background:#f6efe2;color:#51453b;font-family:serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{max-width:720px;padding:40px;background:#fffaf0;border-radius:24px;box-shadow:0 12px 40px #0002;text-align:center}
.tree{font-size:72px}.leaf{color:#7d9b73}.item{display:inline-block;margin:8px;padding:12px 18px;border-radius:16px;background:#f0dfc8;cursor:pointer}.hide{display:none}
</style>
</head>
<body>
<div class="card">
<div class="tree">🌳</div>
<h1>第20圈闭合以前</h1>
<p>一份写给二十岁的生日解谜礼物。</p>
<p>从初三到大三，六段记忆等待被重新发现。</p>
<div class="item" onclick="unlock('星光里的小王子')">🌸 初三 星光</div>
<div class="item" onclick="unlock('风经过少年肩上')">🍃 高中 风</div>
<div class="item" onclick="unlock('呼吸留下的颜色')">🌊 大一 呼吸</div>
<div class="item" onclick="unlock('104号底片')">📷 大二 底片</div>
<div class="item" onclick="unlock('两座城市之间')">📮 大三 邮戳</div>
<p id="result"></p>
</div>
<script>
function unlock(t){document.getElementById('result').textContent='发现记忆章节：'+t+'。谜题系统正在接入。'}
</script>
</body>
</html>
